services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - smartfln_mongo:/data/db

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      SMARTFLN_ENV: production
      SMARTFLN_API_HOST: 0.0.0.0
      SMARTFLN_API_PORT: 8080
      SMARTFLN_STORE_PROVIDER: memory
      SMARTFLN_MONGO_URI: mongodb://mongo:27017/smartfln
      SMARTFLN_MONGO_DB_NAME: smartfln
      SMARTFLN_JWT_SECRET: change-this-secret
      SMARTFLN_QR_SIGNING_SECRET: change-this-qr-secret
      SMARTFLN_CORS_ORIGINS: http://127.0.0.1:5173,http://localhost:5173
      SMARTFLN_PUBLIC_API_URL: http://127.0.0.1:8080
      SMARTFLN_PUBLIC_APP_URL: http://127.0.0.1:5173
    ports:
      - "8080:8080"

volumes:
  smartfln_mongo:
