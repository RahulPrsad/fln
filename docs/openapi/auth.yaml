openapi: 3.1.0
info:
  title: SmartFLN Auth API
  version: 0.1.0
  description: Milestone 1 authentication and access foundation.
paths:
  /api/v1/auth/login:
    post:
      summary: Login with email and password
      tags: [Auth]
      responses:
        "200":
          description: Session created
        "401":
          description: Invalid credentials
  /api/v1/auth/otp/request:
    post:
      summary: Request teacher OTP
      tags: [Auth]
      responses:
        "200":
          description: OTP challenge created
  /api/v1/auth/otp/verify:
    post:
      summary: Verify teacher OTP
      tags: [Auth]
      responses:
        "200":
          description: Session created
  /api/v1/auth/refresh:
    post:
      summary: Refresh access token
      tags: [Auth]
      responses:
        "200":
          description: Rotated session returned
        "401":
          description: Refresh token invalid, expired, or already used
  /api/v1/auth/logout:
    post:
      summary: Logout current session
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Session revoked
  /api/v1/auth/me:
    get:
      summary: Get current user
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user returned
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
