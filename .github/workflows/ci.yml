name: SmartFLN CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  foundation:
    name: Foundation checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Show Node version
        run: node --version

      - name: Run API foundation tests
        run: node --test apps/api/test/health.test.js
