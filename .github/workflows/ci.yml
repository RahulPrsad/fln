name: SmartFLN CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  foundation:
    name: Foundation checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Show Node version
        run: node --version

      - name: Set up pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.7.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run API foundation tests
        run: node --test apps/api/test/*.test.js

      - name: Build web app
        run: pnpm --filter @smartfln/web build
